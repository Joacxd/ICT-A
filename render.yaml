services:
  - type: web
    name: icta-monitor
    env: python
    pythonVersion: "3.11.12"
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py
    startCommand: gunicorn api.app:app --bind 0.0.0.0:$PORT

databases:
  - name: icta-db
    databaseName: icta
    user: icta_user